services:
  pileo:
    image: pileo:latest
    build: .
    container_name: pileo
    ports:
      - "3003:3003"
    environment:
      - PILEO_SESSION_SECRET=${PILEO_SESSION_SECRET}
      - PILEO_UPLOAD_DIR=/app/data/uploads
      - PILEO_TRUST_PROXY=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
