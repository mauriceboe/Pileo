services:
  pileo:
    image: pileo:latest
    build: .
    container_name: pileo
    ports:
      - "3000:3000"
    environment:
      - PILEO_SESSION_SECRET=${PILEO_SESSION_SECRET}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
