name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# env.ts requires PILEO_SESSION_SECRET at module load time, even in tests.
# Passing a dummy value here is fine — no test actually exercises the
# cookie-signing path against a real client.
env:
  PILEO_SESSION_SECRET: test-only-secret-not-used-for-anything-real-aaaaaaaaaa

jobs:
  server:
    name: Server (NestJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # `npm ci` fails when the lockfile is generated on a different OS
      # (Windows dev → Linux CI) because platform-specific optional deps like
      # @rollup/rollup-linux-x64-gnu aren't in the lockfile. `npm install`
      # resolves them at install time.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run build --workspace=@pileo/shared
      - run: npm test --workspace=@pileo/server
      - run: npm run typecheck --workspace=@pileo/server

  client:
    name: Client (React 19)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # `npm ci` fails when the lockfile is generated on a different OS
      # (Windows dev → Linux CI) because platform-specific optional deps like
      # @rollup/rollup-linux-x64-gnu aren't in the lockfile. `npm install`
      # resolves them at install time.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run build --workspace=@pileo/shared
      - run: npm test --workspace=@pileo/client
      - run: npm run build --workspace=@pileo/client

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # `npm ci` fails when the lockfile is generated on a different OS
      # (Windows dev → Linux CI) because platform-specific optional deps like
      # @rollup/rollup-linux-x64-gnu aren't in the lockfile. `npm install`
      # resolves them at install time.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run build --workspace=@pileo/shared
      - run: npm run test:coverage --workspace=@pileo/client
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: client/coverage/
