name: Release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'compose.example.yml'
      - '.env.example'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Skip if last commit was the release bump itself
        id: gate
        run: |
          last_msg=$(git log -1 --pretty=%s)
          if [[ "$last_msg" == chore\(release\)* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version (single-digit rollover)
        if: steps.gate.outputs.skip == 'false'
        id: bump
        run: |
          new_version=$(node scripts/bump-version.mjs)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "New version: $new_version"

      - name: Commit version bump
        if: steps.gate.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json client/package.json server/package.json packages/shared/package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        if: steps.gate.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        if: steps.gate.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push image
        if: steps.gate.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            mauriceboe/pileo:latest
            mauriceboe/pileo:${{ steps.bump.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: steps.gate.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
